name: Deploy to GitHub Pages

# Auto-deploys the static site to GitHub Pages on every push.
on:
  push:
    branches:
      - main
      - claude/bank-deposits-qbo-import-cir70g
  workflow_dispatch:

# Permissions required for the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enables the Pages site (source = GitHub Actions) on first run.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Upload the whole repo root — it's already a static site, no build step.
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
